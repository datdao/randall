<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Randall — Choose Save Folder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111827; color: #e0e0e0;
    }
    .card {
      text-align: center; padding: 40px; border-radius: 16px;
      background: #1a1a2e; max-width: 400px; width: 90%;
    }
    h2 { font-size: 18px; margin-bottom: 8px; color: #fff; }
    p { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.5; }
    .current { font-size: 13px; color: #93c5fd; margin-bottom: 20px; }
    button {
      padding: 12px 32px; border: none; border-radius: 8px;
      background: #3b82f6; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    .done { color: #34d399; font-size: 14px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Choose Save Folder</h2>
    <p>Pick where Randall saves recordings.<br>You can choose Downloads or any other folder.</p>
    <div id="current" class="current"></div>
    <button id="btn-pick">Select Folder</button>
    <div id="done" class="done"></div>
  </div>
  <script src="choose-folder.js"></script>
</body>
</html>
